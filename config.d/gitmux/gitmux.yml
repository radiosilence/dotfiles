tmux:
    symbols:
        branch: " "
        hashprefix: ":"
        ahead: "↑"
        behind: "↓"
        staged: "● "
        conflict: " "
        modified: " "
        untracked: " "
        stashed: " "
        clean: ""
    styles:
        clear: "#[none]"
        state: "#[fg=#ff6188,bold]"
        branch: "#[fg=#a9dc76]"
        remote: "#[fg=#78dce8]"
        divergence: "#[fg=#ffd866]"
        staged: "#[fg=#a9dc76]"
        conflict: "#[fg=#ff6188,bold]"
        modified: "#[fg=#fc9867]"
        untracked: "#[fg=#ab9df2]"
        stashed: "#[fg=#78dce8]"
        insertions: "#[fg=#a9dc76]"
        deletions: "#[fg=#ff6188]"
        clean: "#[fg=#a9dc76]"
    layout: [branch, divergence, " ", flags]
    options:
        branch_max_len: 30
        branch_trim: right
        ellipsis: …
        hide_clean: true

# koan — shareable defaults (safe to commit to dotfiles)

[library]

[organize]
default = "default"

[organize.patterns]
default = "%album artist%/$if($stricmp(%album artist%,Various Artists),,['('$left(%date%,4)')' ])%album% '['%codec%']'/[$num(%discnumber%,2)][%tracknumber%. ][%artist% - ]%title%"

[playback]
pre_amp_db = 0.0
replaygain = "album"
show_fps = true
software_volume = false
target_fps = 60
ticker_fps = 8

[remote]
download_workers = 5
enabled = true
password = "eFbWy2MnWx23kDVx.2sy"
transcode_quality = "original"
url = "https://music.blit.cc"
username = "admin"

[visualizer]
amplitude_scale = "aweight"
bar_decay_ms = 50
enabled = true
fps = 60
peak_decay_ms = 180
scale = "bark"

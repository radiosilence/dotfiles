[playback]
software_volume = false
replaygain = "album"
ticker_fps = 8
target_fps = 60
show_fps = false
pre_amp_db = 0.0

[remote]
enabled = true
playground = false
port = 4000

[library]

[organize]
default = "default"

[organize.patterns]
default = "%album artist%/$if($stricmp(%album artist%,Various Artists),,['('$left(%date%,4)')' ])%album% '['%codec%']'/[$num(%discnumber%,2)][%tracknumber%. ][%artist% - ]%title%"

[visualizer]
enabled = true
fps = 60
scale = "bark"
amplitude_scale = "aweight"
bar_decay_ms = 50
peak_decay_ms = 180

[radio]
batch_size = 5
discovery_weight = 0.3
history_window = 200
seed_window = 5
use_subsonic = true

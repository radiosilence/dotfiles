[env]
KERL_BUILD_DOCS = "yes"
CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"
CLAUDE_CODE_NO_FLICKER = "1"

[tools]
bun = "latest"  # JS runtime
deno = "latest"  # Secure JS/TS runtime
codeowners-lsp = "latest"  # Codeowners LSP
fastmail-cli = "latest"  # Fastmail CLI
koan = "latest"  # TUI music player
nano-web = "latest"  # Ultrafast webserver
watchwoman = "latest"  # Watchman replacement
bat = "latest"  # Cat with wings
broot = "latest"  # Directory navigation
delta = "latest"  # Better git diffs
fastfetch = "latest"  # System info
fd = "latest"  # Fast find alternative
fzf = "latest"  # Fuzzy finder
git-lfs = "latest"  # Large file storage
glow = "latest"  # Terminal Markdown renderer
helix = "latest"  # Terminal text editor (nightly)
hyperfine = "latest"  # Benchmarking
jq = "latest"  # JSON processor
kubecolor = "latest"  # Terminal kubectl colorizer
lsd = "latest"  # Modern ls replacement
oha = "latest"  # Load testing
pnpm = "latest"  # Node package manager
pnpm-shell-completion = "latest"
procs = "latest"  # Better ps
pup = "latest"  # DD Client
ripgrep = "latest"  # Fast grep
sheldon = "latest"  # Zsh plug-in manager
starship = "latest"  # Prompt
taplo = "latest"  # TOML formatter
task = "latest"  # Task runner (gopher)
tmux = "latest"  # Terminal multiplexer
xh = "latest"  # Modern HTTP client
zellij = "latest"  # Terminal multiplexer (tiles)
zoxide = "latest"  # Smart cd replacement
zsh-patina = "latest"  # ZSH syntax highlighting

[[tools.yt-dlp]]  # Video downloader (nightly)
version = "latest"
bin = "yt-dlp"

[[tools.yq]]
version = "latest"
bin = "yq"

[[tools."pipx:beets"]]  # Music organizer
version = "latest"
uvx_args = "--with requests --with beets-yearfixer --with beets[discogs]"

[settings]
fetch_remote_versions_cache = "30m"
experimental = true
trusted_config_paths = ["~/workspace", "~/.dotfiles", "~/.config/mise"]
env_file = ".env"
jobs = 14

# Pin canonical short names to the GitHub backend so dependent project
# mise.toml files (`task = "..."`, `yq = "..."`, etc.) resolve here without
# bouncing to aqua/asdf.
[tool_alias]
# Personal repos (no canonical alias)
codeowners-lsp = "github:radiosilence/codeowners-lsp"
fastmail-cli = "github:radiosilence/fastmail-cli"
koan = "github:radiosilence/koan"
nano-web = "github:radiosilence/nano-web"
watchwoman = "github:radiosilence/watchwoman"
bat = "github:sharkdp/bat"
broot = "github:Canop/broot"
delta = "github:dandavison/delta"
fastfetch = "github:fastfetch-cli/fastfetch"
fd = "github:sharkdp/fd"
fzf = "github:junegunn/fzf"
git-lfs = "github:git-lfs/git-lfs"
glow = "github:charmbracelet/glow"
helix = "github:helix-editor/helix"
hyperfine = "github:sharkdp/hyperfine"
jq = "github:jqlang/jq"
kubecolor = "github:kubecolor/kubecolor"
lsd = "github:lsd-rs/lsd"
oha = "github:hatoo/oha"
pnpm = "github:pnpm/pnpm"
pnpm-shell-completion = "github:g-plane/pnpm-shell-completion"
procs = "github:dalance/procs"
pup = "github:datadog-labs/pup"
ripgrep = "github:BurntSushi/ripgrep"
sheldon = "github:rossmacarthur/sheldon"
starship = "github:starship/starship"
taplo = "github:tamasfe/taplo"
task = "github:go-task/task"
tmux = "github:tmux/tmux-builds"
xh = "github:ducaale/xh"
yq = "github:mikefarah/yq"
yt-dlp = "github:yt-dlp/yt-dlp-nightly-builds"
zellij = "github:zellij-org/zellij"
zoxide = "github:ajeetdsouza/zoxide"
zsh-patina = "github:michel-kraemer/zsh-patina"

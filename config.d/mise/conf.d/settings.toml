[settings]
fetch_remote_versions_cache = "30m"
experimental = true
trusted_config_paths = ["~/workspace", "~/.dotfiles", "~/.config/mise"]
env_file = ".env"
jobs = 14
# Don't auto-install missing tools on shell startup / cd / shim invocation.
# `task converge` (or `mise i`) handles installs explicitly. The defaults are
# all `true`, which means every new shell during bootstrap tries to install
# the entire tool list before anything else is ready.
auto_install = false
not_found_auto_install = false

# mise hits the GitHub API to resolve plugin/tool releases and gets
# rate-limited at 60/hr unauthenticated. The advertised `gh_cli_tokens = true`
# default is a no-op as of 2026.5.15 (mise only reads ~/.config/mise/github_tokens.toml,
# never shells out to gh). credential_command lazy-resolves per fetch via gh,
# so no token has to live in the env. Replaces the deleted GITHUB_TOKEN export
# from 20-github.zsh.
[settings.github]
credential_command = "gh auth token"

# Alacritty configuration (matching Ghostty as source of truth)

# Font configuration (matching ghostty: Geist Mono, size 11)
[font]
size = 11.0

[font.normal]
family = "GeistMono Nerd Font"
style = "Regular"

[font.bold]
family = "GeistMono Nerd Font"
style = "Bold"

[font.italic]
family = "GeistMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "GeistMono Nerd Font"
style = "Bold Italic"

# Window configuration
[window]
option_as_alt = "Both"
opacity = 0.85
blur = true
decorations = "Transparent"
startup_mode = "Windowed"

[window.dimensions]
columns = 160
lines = 64

[window.padding]
x = 2
y = 2

# Colors: Monokai Pro (matching Ghostty theme exactly)
[colors.primary]
background = "#2d2a2e"
foreground = "#fcfcfa"

[colors.cursor]
text = "#000000"
cursor = "#c1c0c0"

[colors.selection]
text = "#fcfcfa"
background = "#5b595c"

[colors.normal]
black = "#3d3a3e"
red = "#ff6188"
green = "#a9dc76"
yellow = "#ffd866"
blue = "#fc9867"
magenta = "#ab9df2"
cyan = "#78dce8"
white = "#fcfcfa"

[colors.bright]
black = "#727072"
red = "#ff6188"
green = "#a9dc76"
yellow = "#ffd866"
blue = "#fc9867"
magenta = "#ab9df2"
cyan = "#78dce8"
white = "#fcfcfa"

# Scrolling
[scrolling]
history = 10000
multiplier = 3

# Mouse
[mouse]
hide_when_typing = false

# Shell
[terminal.shell]
program = "/opt/homebrew/bin/zsh"

# Key bindings
# Alt compose keys (matching ghostty alt keybinds for UK keyboard)
[[keyboard.bindings]]
key = "3"
mods = "Alt"
chars = "#"

[[keyboard.bindings]]
key = "2"
mods = "Alt"
chars = "€"

[[keyboard.bindings]]
key = "0"
mods = "Alt"
chars = "º"

# Alt+Backspace sends Ctrl+W (word delete, matching ghostty)
[[keyboard.bindings]]
key = "Back"
mods = "Alt"
chars = "\u0017"

# Shift+Enter sends newline (matching ghostty)
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\n"

# Copy/Paste
[[keyboard.bindings]]
key = "C"
mods = "Command"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Command"
action = "Paste"

# Font size adjustment
[[keyboard.bindings]]
key = "Plus"
mods = "Command"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Command"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "Key0"
mods = "Command"
action = "ResetFontSize"

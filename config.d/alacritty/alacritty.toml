# Font: Geist Mono 11 (shared across all three terminals)
[font]
size = 11.0

[font.normal]
family = "GeistMono Nerd Font"
style = "Regular"

[font.bold]
family = "GeistMono Nerd Font"
style = "Bold"

[font.italic]
family = "GeistMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "GeistMono Nerd Font"
style = "Bold Italic"

# Window
[window]
option_as_alt = "Both"
opacity = 0.85
blur = true
decorations = "Transparent"
startup_mode = "Windowed"

[window.dimensions]
columns = 160
lines = 64

[window.padding]
x = 2
y = 2

# Colors: Monokai Pro
[colors.primary]
background = "#2d2a2e"
foreground = "#fcfcfa"

[colors.cursor]
text = "#000000"
cursor = "#c1c0c0"

[colors.selection]
text = "#fcfcfa"
background = "#5b595c"

[colors.normal]
black = "#3d3a3e"
red = "#ff6188"
green = "#a9dc76"
yellow = "#ffd866"
blue = "#fc9867"
magenta = "#ab9df2"
cyan = "#78dce8"
white = "#fcfcfa"

[colors.bright]
black = "#727072"
red = "#ff6188"
green = "#a9dc76"
yellow = "#ffd866"
blue = "#fc9867"
magenta = "#ab9df2"
cyan = "#78dce8"
white = "#fcfcfa"

# Scrolling
[scrolling]
history = 10000
multiplier = 3

# Mouse
[mouse]
hide_when_typing = false

# Shell
[terminal.shell]
program = "/opt/homebrew/bin/zsh"

# UK keyboard alt compose
[[keyboard.bindings]]
key = "3"
mods = "Alt"
chars = "#"

[[keyboard.bindings]]
key = "2"
mods = "Alt"
chars = "€"

[[keyboard.bindings]]
key = "0"
mods = "Alt"
chars = "º"

# Alt+Backspace word delete
[[keyboard.bindings]]
key = "Back"
mods = "Alt"
chars = "\u0017"

# Shift+Enter literal newline
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\n"

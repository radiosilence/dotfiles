# ── Prefix ────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Terminal & Modern Defaults ────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-256color:usstyle"
set -g focus-events on
set -g set-titles on
set -g set-titles-string "#S — #W"
set -g set-clipboard on
set -g allow-passthrough on
set -sg escape-time 0
set -g history-limit 50000
set -g display-time 4000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
setw -g mode-keys vi

# ── Mouse ─────────────────────────────────────────────────────────────
set -g mouse on

# ── Windows & Panes ──────────────────────────────────────────────────
bind c new-window -c "#{pane_current_path}"
bind [ split-window -h -c "#{pane_current_path}"
bind ] split-window -v -c "#{pane_current_path}"

# swap windows left/right
bind -r < swap-window -t -1 \; select-window -t -1
bind -r > swap-window -t +1 \; select-window -t +1

# pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# pane resizing (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Vi Copy Mode ─────────────────────────────────────────────────────
bind v copy-mode                   # prefix+v to enter copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ── Clear Screen ─────────────────────────────────────────────────────
bind -n C-k send-keys -R \; clear-history

# ── Convenience ──────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "config reloaded"
bind x kill-pane                   # skip confirmation
bind X kill-window                 # prefix+shift+x for window

# session picker via sesh (zoxide + fzf)
bind s display-popup -E -w 60% -h 70% \
  "mise x -- sesh connect \"$(mise x -- sesh list --icons --hide-duplicates | mise x -- fzf --ansi --reverse --header='sessions / dirs')\""

# ── Automatic Window Naming ──────────────────────────────────────────
set -g automatic-rename on
# shell prompt → directory basename, running program → command name
set -g automatic-rename-format '#{?#{m:*zsh,#{pane_current_command}},#{b:pane_current_path},#{pane_current_command}}'
set -g allow-rename on          # let programs set title via escape sequences (OSC 0/2)
set -g status-interval 5

# ── Monokai Pro Theme ────────────────────────────────────────────────
# palette: bg=#2d2a2e fg=#fcfcfa dim=#727072 green=#a9dc76
#          yellow=#ffd866 orange=#fc9867 purple=#ab9df2 cyan=#78dce8
#          red=#ff6188 border=#3d3a3e

# status bar
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#727072,bg=#2d2a2e"

# left: session name
set -g status-left-length 30
set -g status-left "#[fg=#2d2a2e,bg=#a9dc76,bold]  #S #[fg=#a9dc76,bg=#2d2a2e] "

# right: git + host + time
set -g status-right-length 120
set -g status-right "#(gitmux -cfg ~/.config/gitmux/gitmux.yml #{pane_current_path}) #[fg=#727072] #h  #[fg=#fcfcfa]%H:%M "

# window list
setw -g window-status-format "#[fg=#727072] #I #W "
setw -g window-status-current-format "#[fg=#ffd866,bold] #I #W "
setw -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=#3d3a3e"
set -g pane-active-border-style "fg=#a9dc76"
set -g pane-border-lines heavy

# copy mode & messages
set -g mode-style "fg=#2d2a2e,bg=#ffd866"
set -g message-style "fg=#fcfcfa,bg=#2d2a2e"
set -g message-command-style "fg=#ffd866,bg=#2d2a2e"

# clock
setw -g clock-mode-colour "#ab9df2"

# ── Plugins (no TPM, manual run-shell) ───────────────────────────────
run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux
run-shell ~/.tmux/plugins/tmux-fzf-url/fzf-url.tmux

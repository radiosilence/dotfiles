version: "3"

output: prefixed
silent: true

vars:
  DOTFILES: "{{.ROOT_DIR}}"

tasks:
  # ===========================================================================
  # System update pipeline
  #
  # DAG:
  #   link, auth, claude, tmux-plugins              — parallel
  #   brew:update → brew:bundle → brew:upgrade → brew:cleanup  — chained
  #   mise → fonts                                  — fonts needs yq
  #   [brew:cleanup, mise] → zsh-completions        — last
  # ===========================================================================

  setup:
    desc: Post-bootstrap setup (build bins, update system, switch to SSH)
    cmds:
      - task: reinstall-bins
      - task: upd
      - task: use-ssh
      - printf "\n  \033[32m󰄬\033[0m \033[1msetup complete\033[0m (restart your terminal)\n\n"

  upd:
    desc: Update the system
    deps:
      - link
      - upd:auth
      - upd:fonts
      - upd:brew:cleanup
      - upd:brew
      - upd:apt
      - upd:dnf
      - upd:mise
      - upd:claude
      - upd:tmux-plugins
      - upd:zsh-completions
    cmds:
      - rm -f ~/.cache/zsh/eval/*.zsh ~/.cache/zsh/eval/*.zwc
      - rm -f ~/.config/zsh/conf.d/*.zwc
      - rm -f ~/.zcompdump
      - printf "\n  \033[32m󰄬\033[0m \033[1msystem update complete\033[0m (restart shell for changes)\n\n"

  link:
    desc: Symlink dotfiles and configs
    cmds:
      - |
        DOTFILES="{{.DOTFILES}}"

        # Dotfiles (.* → ~)
        for f in "$DOTFILES"/.*; do
          name=$(basename "$f")
          case "$name" in
            .|..|.git|.gitignore|.github|.vscode|.sonarlint|\
            .editorconfig|.codeowners-lsp|.ruby-lsp|.crates.toml|.crates2.json)
              continue ;;
          esac
          target="$HOME/$name"
          if [ -L "$target" ] && [ "$(readlink "$target")" = "$f" ]; then
            continue
          fi
          rm -rf "$target"
          ln -s "$f" "$target"
          printf "  \033[32m󰌷\033[0m %s\n" "$name"
        done

        # Config dirs (config.d/* → ~/.config/*)
        mkdir -p "$HOME/.config"
        if [ -d "$DOTFILES/config.d" ]; then
          for f in "$DOTFILES/config.d"/*; do
            [ -e "$f" ] || continue
            name=$(basename "$f")
            [ "$name" = "launchd" ] && continue
            target="$HOME/.config/$name"
            if [ -L "$target" ] && [ "$(readlink "$target")" = "$f" ]; then
              continue
            fi
            rm -rf "$target"
            ln -s "$f" "$target"
            printf "  \033[32m󰌷\033[0m ~/.config/%s\n" "$name"
          done
        fi

        # Gitconfig include
        [ -f "$HOME/.gitconfig" ] || touch "$HOME/.gitconfig"
        if ! grep -q '.dotfiles' "$HOME/.gitconfig" 2>/dev/null; then
          printf '\n[include]\npath = ~/.dotfiles/git.d/core.conf\n' >> "$HOME/.gitconfig"
          printf "  \033[32m󰄬\033[0m gitconfig include\n"
        fi

        # SSH config include
        mkdir -p "$HOME/.ssh"
        if [ ! -f "$HOME/.ssh/config" ]; then
          touch "$HOME/.ssh/config"
          chmod 600 "$HOME/.ssh/config"
        fi
        if ! grep -q '.dotfiles' "$HOME/.ssh/config" 2>/dev/null; then
          printf '\nInclude ~/.dotfiles/ssh.d/*.conf\n' >> "$HOME/.ssh/config"
          printf "  \033[32m󰄬\033[0m ssh config include\n"
        fi

        # Brewfile symlink (macOS)
        if [ "$(uname)" = "Darwin" ] && [ -f "$DOTFILES/Brewfile" ]; then
          target="$HOME/Brewfile"
          if ! [ -L "$target" ] || [ "$(readlink "$target")" != "$DOTFILES/Brewfile" ]; then
            ln -sf "$DOTFILES/Brewfile" "$target"
            printf "  \033[32m󰄬\033[0m Brewfile\n"
          fi
        fi

        # Launchd agents (macOS)
        if [ "$(uname)" = "Darwin" ] && [ -d "$DOTFILES/config.d/launchd" ]; then
          agents="$HOME/Library/LaunchAgents"
          mkdir -p "$agents"
          for plist in "$DOTFILES/config.d/launchd"/*.plist; do
            [ -f "$plist" ] || continue
            name=$(basename "$plist")
            dest="$agents/$name"
            if [ -f "$dest" ] && cmp -s "$plist" "$dest"; then
              continue
            fi
            cp "$plist" "$dest"
            launchctl unload "$dest" 2>/dev/null || true
            launchctl load "$dest" 2>/dev/null || true
            printf "  \033[32m󰄬\033[0m launchd: %s\n" "$name"
          done
        fi

        # Claude Code hooks
        claude_settings="$HOME/.claude/settings.json"
        if command -v jq >/dev/null 2>&1 && [ -f "$claude_settings" ]; then
          if ! jq -e '.hooks.PostToolUse[]?.hooks[]? | select(.command | contains("gastown-file-changed"))' "$claude_settings" >/dev/null 2>&1; then
            jq '
              .hooks //= {} |
              .hooks.PostToolUse //= [] |
              .hooks.PostToolUse += [{"matcher": "Write|Edit", "hooks": [{"type": "command", "command": "~/.dotfiles/hooks/gastown-file-changed.sh"}]}]
            ' "$claude_settings" > "$claude_settings.tmp" && mv "$claude_settings.tmp" "$claude_settings"
            printf "  \033[32m󰄬\033[0m claude hooks: gastown\n"
          fi
        fi

        # Sheldon plugins
        if command -v sheldon >/dev/null 2>&1; then
          sheldon source >/dev/null 2>&1 && printf "  \033[32m󰄬\033[0m sheldon\n" || true
        fi

        printf "  \033[32m󰄬\033[0m link complete\n"

  reinstall-bins:
    desc: Build and install rust binaries from crates/
    deps:
      - upd:mise
    preconditions:
      - sh: command -v cargo
        msg: cargo not found
    cmds:
      - printf "  \033[35m󱁤\033[0m building rust binaries\n"
      - cargo install --path {{.DOTFILES}}/crates --bins --root {{.DOTFILES}}
      - printf "  \033[32m󰄬\033[0m binaries installed\n"

  use-ssh:
    desc: Switch dotfiles remote from HTTPS to SSH
    dir: "{{.DOTFILES}}"
    cmds:
      - |
        current=$(git remote get-url origin)
        if echo "$current" | grep -q "^git@"; then
          printf "  \033[32m󰄬\033[0m already using SSH\n"
          exit 0
        fi
        ssh_url=$(echo "$current" | sed -E 's|https://github.com/(.+)|git@github.com:\1|')
        git remote set-url origin "$ssh_url"
        printf "  \033[32m󰄬\033[0m remote switched to %s\n" "$ssh_url"

  upd:auth:
    desc: Check gh/op authentication
    platforms: [darwin]
    cmds:
      - |
        if command -v gh >/dev/null 2>&1; then
          if gh auth status >/dev/null 2>&1; then
            printf "  \033[32m󰄬\033[0m gh: authenticated\n"
          else
            printf "  \033[33m\033[0m gh: not authenticated (run gh auth login)\n"
          fi
        fi
        if command -v op >/dev/null 2>&1; then
          if op account list >/dev/null 2>&1; then
            printf "  \033[32m󰄬\033[0m op: integrated\n"
          else
            printf "  \033[33m\033[0m op: not integrated (check 1Password CLI settings)\n"
          fi
        fi

  upd:fonts:
    desc: Install missing fonts
    platforms: [darwin]
    deps: [upd:mise]
    preconditions:
      - sh: command -v yq
        msg: yq not installed
    cmds:
      - |
        FONTS_DIR="$HOME/Library/Fonts"
        mkdir -p "$FONTS_DIR"

        count=$(yq -p toml -oy '.fonts | length' "{{.DOTFILES}}/dotfiles.toml")
        [[ "$count" -gt 0 ]] || { echo "no fonts configured"; exit 0; }

        for i in $(seq 0 $((count - 1))); do
          name=$(yq -p toml -oy -r ".fonts[$i].name" "{{.DOTFILES}}/dotfiles.toml")
          url=$(yq -p toml -oy -r ".fonts[$i].url" "{{.DOTFILES}}/dotfiles.toml")
          marker=$(yq -p toml -oy -r ".fonts[$i].marker_file" "{{.DOTFILES}}/dotfiles.toml")

          if [ -f "$FONTS_DIR/$marker" ]; then
            printf "  \033[32m󰄬\033[0m %s (installed)\n" "$name"
            continue
          fi

          printf "  \033[35m󱁤\033[0m %s (downloading)\n" "$name"
          tmpdir=$(mktemp -d)
          trap "rm -rf '$tmpdir'" EXIT
          curl -fsSL "$url" -o "$tmpdir/font.zip"
          unzip -qo "$tmpdir/font.zip" -d "$tmpdir/extracted"
          find "$tmpdir/extracted" \( -iname '*.otf' -o -iname '*.ttf' \) -exec cp {} "$FONTS_DIR/" \;
          rm -rf "$tmpdir"
          printf "  \033[32m󰄬\033[0m %s (installed)\n" "$name"
        done

  upd:brew:
    desc: Brew upgrades
    deps: [upd:brew:update, upd:brew:bundle]

  upd:brew:update:
    desc: Update brew index
    deps: [link]
    platforms: [darwin]
    preconditions:
      - sh: command -v brew
        msg: brew not installed
    cmds:
      - brew update --quiet

  upd:brew:bundle:
    desc: Install Brewfile packages
    platforms: [darwin]
    deps: [upd:brew:update]
    preconditions:
      - sh: command -v brew
        msg: brew not installed
    cmds:
      - HOMEBREW_NO_AUTO_UPDATE=1 brew bundle --quiet

  upd:brew:upgrade:
    desc: Upgrade brew packages
    platforms: [darwin]
    deps: [upd:brew:bundle, upd:brew:update]
    preconditions:
      - sh: command -v brew
        msg: brew not installed
    cmds:
      - HOMEBREW_NO_AUTO_UPDATE=1 brew upgrade --greedy --quiet

  upd:brew:cleanup:
    desc: Cleanup brew
    platforms: [darwin]
    deps: [upd:brew]
    preconditions:
      - sh: command -v brew
        msg: brew not installed
    cmds:
      - brew cleanup --quiet

  upd:apt:
    desc: Update apt packages
    platforms: [linux]
    preconditions:
      - sh: command -v apt-get
        msg: apt-get not installed
    cmds:
      - sudo apt-get update
      - sudo apt-get upgrade -y
      - sudo apt-get autoremove -y

  upd:dnf:
    desc: Update dnf packages
    platforms: [linux]
    preconditions:
      - sh: command -v dnf
        msg: dnf not installed
    cmds:
      - sudo dnf update -y

  upd:mise:
    desc: Update mise tools
    preconditions:
      - sh: command -v mise
        msg: mise not installed
    cmds:
      - mise up
      - mise reshim

  upd:claude:
    desc: Update Claude Code
    preconditions:
      - sh: command -v claude
        msg: claude not installed
    cmds:
      - claude --update

  upd:tmux-plugins:
    desc: Install/update tmux plugins
    vars:
      PLUGINS_DIR: "{{.HOME}}/.tmux/plugins"
    cmds:
      - mkdir -p {{.PLUGINS_DIR}}
      - |
        dest="{{.PLUGINS_DIR}}/tmux-resurrect"
        if [ -d "$dest" ]; then
          git -C "$dest" pull --quiet
          printf "  \033[32m󰄬\033[0m tmux-resurrect (updated)\n"
        else
          git clone --quiet https://github.com/tmux-plugins/tmux-resurrect.git "$dest"
          printf "  \033[32m󰄬\033[0m tmux-resurrect (installed)\n"
        fi
      - |
        dest="{{.PLUGINS_DIR}}/tmux-fzf-url"
        if [ -d "$dest" ]; then
          git -C "$dest" pull --quiet
          printf "  \033[32m󰄬\033[0m tmux-fzf-url (updated)\n"
        else
          git clone --quiet https://github.com/wfxr/tmux-fzf-url.git "$dest"
          printf "  \033[32m󰄬\033[0m tmux-fzf-url (installed)\n"
        fi

  upd:zsh-completions:
    desc: Regenerate zsh completions
    deps: [upd:brew, upd:mise]
    preconditions:
      - sh: command -v regen-zsh-completions
        msg: regen-zsh-completions not found (run mise run reinstall-bins)
    cmds:
      - regen-zsh-completions

version: "3"

output: prefixed
silent: true
run: once

vars:
  DOTFILES: "{{.ROOT_DIR}}"
  # Icons
  OK: '\033[32m󰄬\033[0m'
  WARN: '\033[33m\033[0m'
  FAIL: '\033[31m󰅖\033[0m'
  LINK: '\033[32m󰌷\033[0m'
  WORK: '\033[35m󱁤\033[0m'
  BOLD: '\033[1m'
  RESET: '\033[0m'

env:
  CLICOLOR_FORCE: "1"
  FORCE_COLOR: "1"

tasks:
  # ===========================================================================
  # System update pipeline
  #
  # DAG:
  #   link:*, auth:*, claude, tmux:*            — parallel
  #   brew:update → brew:bundle → brew:upgrade → brew:cleanup  — chained
  #   mise → fonts                              — fonts needs yq
  #   [brew:cleanup, mise] → zsh-completions    — last
  # ===========================================================================

  setup:
    desc: Post-bootstrap setup (build bins, update system, switch to SSH)
    cmds:
      - task: reinstall-bins
      - task: upd
      - task: use-ssh
      - printf "{{.OK}} {{.BOLD}}setup complete{{.RESET}} (restart your terminal)\n"

  upd:
    desc: Update the system
    deps:
      - link
      - upd:auth
      - upd:fonts
      - upd:brew:cleanup
      - upd:brew
      - upd:apt
      - upd:dnf
      - upd:mise
      - upd:claude
      - upd:tmux
      - upd:zsh-completions
    cmds:
      - rm -f ~/.cache/zsh/eval/*.zsh ~/.cache/zsh/eval/*.zwc
      - rm -f ~/.config/zsh/conf.d/*.zwc
      - rm -f ~/.zcompdump
      - printf "{{.OK}} {{.BOLD}}system update complete{{.RESET}} (restart shell for changes)\n"

  # ---------------------------------------------------------------------------
  # Link tasks
  # ---------------------------------------------------------------------------

  link:
    desc: Symlink dotfiles and configs
    deps:
      - link:dotfiles
      - link:config
      - link:gitconfig
      - link:ssh
      - link:brewfile
      - link:claude-hooks
      - link:sheldon

  link:dotfiles:
    desc: Symlink dotfiles (.* → ~)
    cmds:
      - |
        for f in "{{.DOTFILES}}"/.* ; do
          name=$(basename "$f")
          case "$name" in
            .|..|.git|.gitignore|.github|.vscode|.sonarlint|\
            .editorconfig|.codeowners-lsp|.ruby-lsp|.crates.toml|.crates2.json)
              continue ;;
          esac
          target="$HOME/$name"
          [ -L "$target" ] && [ "$(readlink "$target")" = "$f" ] && continue
          rm -rf "$target"
          ln -s "$f" "$target"
          printf "{{.LINK}} %s\n" "$name"
        done

  link:config:
    desc: Symlink config dirs (config.d/* → ~/.config/*)
    cmds:
      - |
        mkdir -p "$HOME/.config"
        for f in "{{.DOTFILES}}/config.d"/*; do
          [ -e "$f" ] || continue
          name=$(basename "$f")
          target="$HOME/.config/$name"
          [ -L "$target" ] && [ "$(readlink "$target")" = "$f" ] && continue
          rm -rf "$target"
          ln -s "$f" "$target"
          printf "{{.LINK}} ~/.config/%s\n" "$name"
        done

  link:gitconfig:
    desc: Ensure gitconfig includes dotfiles
    cmds:
      - |
        [ -f "$HOME/.gitconfig" ] || touch "$HOME/.gitconfig"
        grep -q '.dotfiles' "$HOME/.gitconfig" 2>/dev/null && exit 0
        printf '\n[include]\npath = ~/.dotfiles/git.d/core.conf\n' >> "$HOME/.gitconfig"
        printf "{{.OK}} gitconfig include\n"

  link:ssh:
    desc: Ensure SSH config includes dotfiles
    cmds:
      - |
        mkdir -p "$HOME/.ssh"
        if [ ! -f "$HOME/.ssh/config" ]; then
          touch "$HOME/.ssh/config"
          chmod 600 "$HOME/.ssh/config"
        fi
        grep -q '.dotfiles' "$HOME/.ssh/config" 2>/dev/null && exit 0
        printf '\nInclude ~/.dotfiles/ssh.d/*.conf\n' >> "$HOME/.ssh/config"
        printf "{{.OK}} ssh config include\n"

  link:brewfile:
    desc: Symlink Brewfile
    platforms: [darwin]
    cmds:
      - |
        target="$HOME/Brewfile"
        [ -L "$target" ] && [ "$(readlink "$target")" = "{{.DOTFILES}}/Brewfile" ] && exit 0
        ln -sf "{{.DOTFILES}}/Brewfile" "$target"
        printf "{{.OK}} Brewfile\n"

  link:claude-hooks:
    desc: Inject Claude Code hooks into settings.json
    cmds:
      - |
        claude_settings="$HOME/.claude/settings.json"
        command -v jq >/dev/null 2>&1 || exit 0
        [ -f "$claude_settings" ] || exit 0
        jq -e '.hooks.PostToolUse[]?.hooks[]? | select(.command | contains("gastown-file-changed"))' "$claude_settings" >/dev/null 2>&1 && exit 0
        jq '
          .hooks //= {} |
          .hooks.PostToolUse //= [] |
          .hooks.PostToolUse += [{"matcher": "Write|Edit", "hooks": [{"type": "command", "command": "~/.dotfiles/hooks/gastown-file-changed.sh"}]}]
        ' "$claude_settings" > "$claude_settings.tmp" && mv "$claude_settings.tmp" "$claude_settings"
        printf "{{.OK}} claude hooks: gastown\n"

  link:sheldon:
    desc: Sheldon plugin manager
    cmds:
      - |
        command -v sheldon >/dev/null 2>&1 || exit 0
        sheldon source >/dev/null 2>&1 && printf "{{.OK}} sheldon\n" || true

  # ---------------------------------------------------------------------------
  # Build / utility tasks
  # ---------------------------------------------------------------------------

  reinstall-bins:
    desc: Build and install rust binaries from crates/
    deps: [upd:mise]
    preconditions:
      - sh: command -v cargo
        msg: cargo not found
    cmds:
      - printf "{{.WORK}} building rust binaries\n"
      - cargo install --path {{.DOTFILES}}/crates --bins --root {{.DOTFILES}}
      - printf "{{.OK}} binaries installed\n"

  use-ssh:
    desc: Switch dotfiles remote from HTTPS to SSH
    dir: "{{.DOTFILES}}"
    cmds:
      - |
        current=$(git remote get-url origin)
        if echo "$current" | grep -q "^git@"; then
          printf "{{.OK}} already using SSH\n"
          exit 0
        fi
        ssh_url=$(echo "$current" | sed -E 's|https://github.com/(.+)|git@github.com:\1|')
        git remote set-url origin "$ssh_url"
        printf "{{.OK}} remote switched to %s\n" "$ssh_url"

  # ---------------------------------------------------------------------------
  # Update tasks
  # ---------------------------------------------------------------------------

  upd:auth:
    desc: Check authentication status
    deps:
      - upd:auth:gh
      - upd:auth:op

  upd:auth:gh:
    desc: Check GitHub CLI auth
    platforms: [darwin]
    cmds:
      - |
        command -v gh >/dev/null 2>&1 || exit 0
        if gh auth status >/dev/null 2>&1; then
          printf "{{.OK}} gh: authenticated\n"
        else
          printf "{{.WARN}} gh: not authenticated (run gh auth login)\n"
        fi

  upd:auth:op:
    desc: Check 1Password CLI integration
    platforms: [darwin]
    cmds:
      - |
        command -v op >/dev/null 2>&1 || exit 0
        if op account list >/dev/null 2>&1; then
          printf "{{.OK}} op: integrated\n"
        else
          printf "{{.WARN}} op: not integrated (check 1Password CLI settings)\n"
        fi

  upd:fonts:
    desc: Install missing fonts
    platforms: [darwin]
    deps:
      - upd:fonts:hack
      - upd:fonts:geist
      - upd:fonts:geist-mono

  upd:fonts:hack:
    desc: Install Hack Ligatured
    platforms: [darwin]
    status:
      - test -f ~/Library/Fonts/HackNerdFontJBMLigatured-Regular.ttf
    cmds:
      - mkdir -p ~/Library/Fonts
      - |
        printf "{{.WORK}} Hack Ligatured\n"
        tmpdir=$(mktemp -d)
        curl -fsSL "https://github.com/gaplo917/Ligatured-Hack/releases/download/v3.003%2BNv2.1.0%2BFC%2BJBMv2.242/HackLigatured-v3.003%2BFC3.1%2BJBMv2.242.zip" -o "$tmpdir/font.zip"
        unzip -qo "$tmpdir/font.zip" -d "$tmpdir/out"
        find "$tmpdir/out" \( -iname '*.otf' -o -iname '*.ttf' \) -exec cp {} ~/Library/Fonts/ \;
        rm -rf "$tmpdir"
        printf "{{.OK}} Hack Ligatured\n"

  upd:fonts:geist:
    desc: Install Geist
    platforms: [darwin]
    status:
      - test -f ~/Library/Fonts/Geist-Regular.otf
    cmds:
      - mkdir -p ~/Library/Fonts
      - |
        printf "{{.WORK}} Geist\n"
        tmpdir=$(mktemp -d)
        curl -fsSL "https://github.com/vercel/geist-font/releases/download/geist%401.7.0/geist-font-v1.7.0.zip" -o "$tmpdir/font.zip"
        unzip -qo "$tmpdir/font.zip" -d "$tmpdir/out"
        find "$tmpdir/out" \( -iname '*.otf' -o -iname '*.ttf' \) -exec cp {} ~/Library/Fonts/ \;
        rm -rf "$tmpdir"
        printf "{{.OK}} Geist\n"

  upd:fonts:geist-mono:
    desc: Install Geist Mono Nerd Font
    platforms: [darwin]
    status:
      - test -f ~/Library/Fonts/GeistMonoNerdFont-Regular.otf
    cmds:
      - mkdir -p ~/Library/Fonts
      - |
        printf "{{.WORK}} Geist Mono Nerd Font\n"
        tmpdir=$(mktemp -d)
        curl -fsSL "https://github.com/ryanoasis/nerd-fonts/releases/download/v3.4.0/GeistMono.zip" -o "$tmpdir/font.zip"
        unzip -qo "$tmpdir/font.zip" -d "$tmpdir/out"
        find "$tmpdir/out" \( -iname '*.otf' -o -iname '*.ttf' \) -exec cp {} ~/Library/Fonts/ \;
        rm -rf "$tmpdir"
        printf "{{.OK}} Geist Mono Nerd Font\n"

  upd:brew:
    desc: Brew upgrades
    deps: [upd:brew:upgrade, upd:brew:bundle]

  upd:brew:update:
    desc: Update brew index
    deps: [link:brewfile]
    platforms: [darwin]
    preconditions:
      - sh: command -v brew
        msg: brew not installed
    cmds:
      - brew update --quiet

  upd:brew:bundle:
    desc: Install Brewfile packages
    platforms: [darwin]
    deps: [upd:brew:update]
    preconditions:
      - sh: command -v brew
        msg: brew not installed
    cmds:
      - HOMEBREW_NO_AUTO_UPDATE=1 brew bundle --quiet

  upd:brew:upgrade:
    desc: Upgrade brew packages
    platforms: [darwin]
    deps: [upd:brew:bundle, upd:brew:update]
    preconditions:
      - sh: command -v brew
        msg: brew not installed
    cmds:
      - HOMEBREW_NO_AUTO_UPDATE=1 brew upgrade --greedy --quiet

  upd:brew:cleanup:
    desc: Cleanup brew
    platforms: [darwin]
    deps: [upd:brew]
    preconditions:
      - sh: command -v brew
        msg: brew not installed
    cmds:
      - brew cleanup --quiet

  upd:apt:
    desc: Update apt packages
    platforms: [linux]
    preconditions:
      - sh: command -v apt-get
        msg: apt-get not installed
    cmds:
      - sudo apt-get update
      - sudo apt-get upgrade -y
      - sudo apt-get autoremove -y

  upd:dnf:
    desc: Update dnf packages
    platforms: [linux]
    preconditions:
      - sh: command -v dnf
        msg: dnf not installed
    cmds:
      - sudo dnf update -y

  upd:mise:
    desc: Update mise tools
    preconditions:
      - sh: command -v mise
        msg: mise not installed
    cmds:
      - mise up
      - mise reshim

  upd:claude:
    desc: Update Claude Code
    preconditions:
      - sh: command -v claude
        msg: claude not installed
    cmds:
      - claude --update

  upd:tmux:
    desc: Install/update tmux plugins
    deps:
      - upd:tmux:resurrect
      - upd:tmux:fzf-url

  upd:tmux:resurrect:
    desc: Install/update tmux-resurrect
    vars:
      DEST: "{{.HOME}}/.tmux/plugins/tmux-resurrect"
    cmds:
      - mkdir -p {{.HOME}}/.tmux/plugins
      - |
        if [ -d "{{.DEST}}" ]; then
          git -C "{{.DEST}}" pull --quiet
          printf "{{.OK}} tmux-resurrect (updated)\n"
        else
          git clone --quiet https://github.com/tmux-plugins/tmux-resurrect.git "{{.DEST}}"
          printf "{{.OK}} tmux-resurrect (installed)\n"
        fi

  upd:tmux:fzf-url:
    desc: Install/update tmux-fzf-url
    vars:
      DEST: "{{.HOME}}/.tmux/plugins/tmux-fzf-url"
    cmds:
      - mkdir -p {{.HOME}}/.tmux/plugins
      - |
        if [ -d "{{.DEST}}" ]; then
          git -C "{{.DEST}}" pull --quiet
          printf "{{.OK}} tmux-fzf-url (updated)\n"
        else
          git clone --quiet https://github.com/wfxr/tmux-fzf-url.git "{{.DEST}}"
          printf "{{.OK}} tmux-fzf-url (installed)\n"
        fi

  upd:zsh-completions:
    desc: Regenerate zsh completions
    deps:
      - upd:brew:cleanup
      - upd:mise
      - task: upd:zsh-completions:setup
      # Default: <tool> completion zsh — runs in parallel via for-in-deps
      - for:
          - gt
          - argocd
          - docker
          - helm
          - k9s
          - kubectl
          - lefthook
          - nano-web
          - op
          - orbctl
          - pulumi
          - tilt
          - turso
          - yq
          - fcloud
          - houston
          - koan
          - clean-dls
          - clean-exif
          - embed-art
          - extract-exif-from-flac
          - git-squash
          - git-sync
          - imp
          - install-font-macos
          - kill-port
          - parallel-dl-extract
          - prune
          - prune-gen
          - to-audio
          - unfuck-xcode
          - url2base64
          - vimv
        task: upd:zsh-completions:gen
        vars:
          TOOL: "{{.ITEM}}"
          CMD: "{{.ITEM}} completion zsh"
      # Custom completion commands
      - task: upd:zsh-completions:gen
        vars: { TOOL: gh, CMD: "gh completion -s zsh" }
      - task: upd:zsh-completions:gen
        vars: { TOOL: fastmail-cli, CMD: "fastmail-cli completions zsh" }
      - task: upd:zsh-completions:gen
        vars: { TOOL: codeowners-cli, CMD: "codeowners-cli completions zsh" }
      - task: upd:zsh-completions:gen
        vars: { TOOL: task, CMD: "task --completion zsh" }
      - task: upd:zsh-completions:gen
        vars: { TOOL: just, CMD: "just --completions zsh" }
      - task: upd:zsh-completions:gen
        vars: { TOOL: aws-vault, CMD: "aws-vault --completion-script-zsh" }
      - task: upd:zsh-completions:gen
        vars: { TOOL: rg, CMD: "rg --generate complete-zsh" }
      - task: upd:zsh-completions:gen
        vars: { TOOL: pup, CMD: "pup completions zsh" }
      # Prebuilt: lsd
      - task: upd:zsh-completions:lsd
      # Sourced: npm
      - task: upd:zsh-completions:npm

  upd:zsh-completions:setup:
    internal: true
    vars:
      COMP_DIR: "{{.HOME}}/.config/zsh/completions"
    cmds:
      - mkdir -p {{.COMP_DIR}}
      - rm -f {{.COMP_DIR}}/_*

  upd:zsh-completions:gen:
    internal: true
    vars:
      COMP_DIR: "{{.HOME}}/.config/zsh/completions"
    cmds:
      - |
        command -v {{.TOOL}} >/dev/null 2>&1 || exit 0
        if {{.CMD}} > "{{.COMP_DIR}}/_{{.TOOL}}" 2>/dev/null && [ -s "{{.COMP_DIR}}/_{{.TOOL}}" ]; then
          printf "{{.OK}} %s\n" "{{.TOOL}}"
        else
          rm -f "{{.COMP_DIR}}/_{{.TOOL}}"
        fi

  upd:zsh-completions:lsd:
    internal: true
    vars:
      COMP_DIR: "{{.HOME}}/.config/zsh/completions"
    cmds:
      - |
        command -v lsd >/dev/null 2>&1 || exit 0
        src="$(dirname "$(command -v lsd)")/autocomplete/_lsd"
        [ -f "$src" ] && cp "$src" "{{.COMP_DIR}}/_lsd" && printf "{{.OK}} lsd (pre-built)\n"

  upd:zsh-completions:npm:
    internal: true
    cmds:
      - |
        command -v npm >/dev/null 2>&1 || exit 0
        npm completion > "{{.DOTFILES}}/config.d/zsh/conf.d/npm-completion.zsh" 2>/dev/null && printf "{{.OK}} npm (sourced)\n"

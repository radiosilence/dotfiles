version: "3"

output: prefixed
silent: true
run: once

vars:
  DOTFILES: "{{.ROOT_DIR}}"

env:
  CLICOLOR_FORCE: "1"
  FORCE_COLOR: "1"

tasks:
  # ===========================================================================
  # System update pipeline
  #
  # DAG:
  #   link:*, auth:*, claude, tmux:*            — parallel
  #   brew:update → brew:bundle → brew:upgrade → brew:cleanup  — chained
  #   mise → fonts                              — fonts needs yq
  #   [brew:cleanup, mise] → zsh-completions    — last
  # ===========================================================================

  setup:
    desc: Post-bootstrap setup (build bins, update system, switch to SSH)
    cmds:
      - task: reinstall-bins
      - task: upd
      - task: use-ssh
      - printf "\n  \033[32m󰄬\033[0m \033[1msetup complete\033[0m (restart your terminal)\n\n"

  upd:
    desc: Update the system
    deps:
      - link
      - upd:auth
      - upd:fonts
      - upd:brew:cleanup
      - upd:brew
      - upd:apt
      - upd:dnf
      - upd:mise
      - upd:claude
      - upd:tmux
      - upd:zsh-completions
    cmds:
      - rm -f ~/.cache/zsh/eval/*.zsh ~/.cache/zsh/eval/*.zwc
      - rm -f ~/.config/zsh/conf.d/*.zwc
      - rm -f ~/.zcompdump
      - printf "\033[32m󰄬\033[0m \033[1msystem update complete\033[0m (restart shell for changes)\n"

  # ---------------------------------------------------------------------------
  # Link tasks
  # ---------------------------------------------------------------------------

  link:
    desc: Symlink dotfiles and configs
    deps:
      - link:dotfiles
      - link:config
      - link:gitconfig
      - link:ssh
      - link:brewfile
      - link:launchd
      - link:claude-hooks
      - link:sheldon

  link:dotfiles:
    desc: Symlink dotfiles (.* → ~)
    cmds:
      - |
        for f in "{{.DOTFILES}}"/.* ; do
          name=$(basename "$f")
          case "$name" in
            .|..|.git|.gitignore|.github|.vscode|.sonarlint|\
            .editorconfig|.codeowners-lsp|.ruby-lsp|.crates.toml|.crates2.json)
              continue ;;
          esac
          target="$HOME/$name"
          [ -L "$target" ] && [ "$(readlink "$target")" = "$f" ] && continue
          rm -rf "$target"
          ln -s "$f" "$target"
          printf "  \033[32m󰌷\033[0m %s\n" "$name"
        done

  link:config:
    desc: Symlink config dirs (config.d/* → ~/.config/*)
    cmds:
      - |
        mkdir -p "$HOME/.config"
        for f in "{{.DOTFILES}}/config.d"/*; do
          [ -e "$f" ] || continue
          name=$(basename "$f")
          [ "$name" = "launchd" ] && continue
          target="$HOME/.config/$name"
          [ -L "$target" ] && [ "$(readlink "$target")" = "$f" ] && continue
          rm -rf "$target"
          ln -s "$f" "$target"
          printf "  \033[32m󰌷\033[0m ~/.config/%s\n" "$name"
        done

  link:gitconfig:
    desc: Ensure gitconfig includes dotfiles
    cmds:
      - |
        [ -f "$HOME/.gitconfig" ] || touch "$HOME/.gitconfig"
        grep -q '.dotfiles' "$HOME/.gitconfig" 2>/dev/null && exit 0
        printf '\n[include]\npath = ~/.dotfiles/git.d/core.conf\n' >> "$HOME/.gitconfig"
        printf "  \033[32m󰄬\033[0m gitconfig include\n"

  link:ssh:
    desc: Ensure SSH config includes dotfiles
    cmds:
      - |
        mkdir -p "$HOME/.ssh"
        if [ ! -f "$HOME/.ssh/config" ]; then
          touch "$HOME/.ssh/config"
          chmod 600 "$HOME/.ssh/config"
        fi
        grep -q '.dotfiles' "$HOME/.ssh/config" 2>/dev/null && exit 0
        printf '\nInclude ~/.dotfiles/ssh.d/*.conf\n' >> "$HOME/.ssh/config"
        printf "  \033[32m󰄬\033[0m ssh config include\n"

  link:brewfile:
    desc: Symlink Brewfile
    platforms: [darwin]
    cmds:
      - |
        target="$HOME/Brewfile"
        [ -L "$target" ] && [ "$(readlink "$target")" = "{{.DOTFILES}}/Brewfile" ] && exit 0
        ln -sf "{{.DOTFILES}}/Brewfile" "$target"
        printf "  \033[32m󰄬\033[0m Brewfile\n"

  link:launchd:
    desc: Install launchd agents
    platforms: [darwin]
    cmds:
      - |
        agents="$HOME/Library/LaunchAgents"
        mkdir -p "$agents"
        for plist in "{{.DOTFILES}}/config.d/launchd"/*.plist; do
          [ -f "$plist" ] || continue
          name=$(basename "$plist")
          dest="$agents/$name"
          [ -f "$dest" ] && cmp -s "$plist" "$dest" && continue
          cp "$plist" "$dest"
          launchctl unload "$dest" 2>/dev/null || true
          launchctl load "$dest" 2>/dev/null || true
          printf "  \033[32m󰄬\033[0m launchd: %s\n" "$name"
        done

  link:claude-hooks:
    desc: Inject Claude Code hooks into settings.json
    cmds:
      - |
        claude_settings="$HOME/.claude/settings.json"
        command -v jq >/dev/null 2>&1 || exit 0
        [ -f "$claude_settings" ] || exit 0
        jq -e '.hooks.PostToolUse[]?.hooks[]? | select(.command | contains("gastown-file-changed"))' "$claude_settings" >/dev/null 2>&1 && exit 0
        jq '
          .hooks //= {} |
          .hooks.PostToolUse //= [] |
          .hooks.PostToolUse += [{"matcher": "Write|Edit", "hooks": [{"type": "command", "command": "~/.dotfiles/hooks/gastown-file-changed.sh"}]}]
        ' "$claude_settings" > "$claude_settings.tmp" && mv "$claude_settings.tmp" "$claude_settings"
        printf "  \033[32m󰄬\033[0m claude hooks: gastown\n"

  link:sheldon:
    desc: Sheldon plugin manager
    cmds:
      - |
        command -v sheldon >/dev/null 2>&1 || exit 0
        sheldon source >/dev/null 2>&1 && printf "  \033[32m󰄬\033[0m sheldon\n" || true

  # ---------------------------------------------------------------------------
  # Build / utility tasks
  # ---------------------------------------------------------------------------

  reinstall-bins:
    desc: Build and install rust binaries from crates/
    deps: [upd:mise]
    preconditions:
      - sh: command -v cargo
        msg: cargo not found
    cmds:
      - printf "  \033[35m󱁤\033[0m building rust binaries\n"
      - cargo install --path {{.DOTFILES}}/crates --bins --root {{.DOTFILES}}
      - printf "  \033[32m󰄬\033[0m binaries installed\n"

  use-ssh:
    desc: Switch dotfiles remote from HTTPS to SSH
    dir: "{{.DOTFILES}}"
    cmds:
      - |
        current=$(git remote get-url origin)
        if echo "$current" | grep -q "^git@"; then
          printf "  \033[32m󰄬\033[0m already using SSH\n"
          exit 0
        fi
        ssh_url=$(echo "$current" | sed -E 's|https://github.com/(.+)|git@github.com:\1|')
        git remote set-url origin "$ssh_url"
        printf "  \033[32m󰄬\033[0m remote switched to %s\n" "$ssh_url"

  # ---------------------------------------------------------------------------
  # Update tasks
  # ---------------------------------------------------------------------------

  upd:auth:
    desc: Check authentication status
    deps:
      - upd:auth:gh
      - upd:auth:op

  upd:auth:gh:
    desc: Check GitHub CLI auth
    platforms: [darwin]
    cmds:
      - |
        command -v gh >/dev/null 2>&1 || exit 0
        if gh auth status >/dev/null 2>&1; then
          printf "  \033[32m󰄬\033[0m gh: authenticated\n"
        else
          printf "  \033[33m\033[0m gh: not authenticated (run gh auth login)\n"
        fi

  upd:auth:op:
    desc: Check 1Password CLI integration
    platforms: [darwin]
    cmds:
      - |
        command -v op >/dev/null 2>&1 || exit 0
        if op account list >/dev/null 2>&1; then
          printf "  \033[32m󰄬\033[0m op: integrated\n"
        else
          printf "  \033[33m\033[0m op: not integrated (check 1Password CLI settings)\n"
        fi

  upd:fonts:
    desc: Install missing fonts using install-font-macos
    platforms: [darwin]
    deps: [upd:mise]
    preconditions:
      - sh: command -v yq
        msg: yq not installed
    cmds:
      - |
        command -v install-font-macos >/dev/null 2>&1 || { echo "skipped (no install-font-macos)"; exit 0; }
        urls=$(yq -p toml -oy -r '.fonts[].url' "{{.DOTFILES}}/dotfiles.toml")
        [ -n "$urls" ] || { echo "no fonts configured"; exit 0; }
        install-font-macos $urls

  upd:brew:
    desc: Brew upgrades
    deps: [upd:brew:upgrade, upd:brew:bundle]

  upd:brew:update:
    desc: Update brew index
    deps: [link:brewfile]
    platforms: [darwin]
    preconditions:
      - sh: command -v brew
        msg: brew not installed
    cmds:
      - brew update --quiet

  upd:brew:bundle:
    desc: Install Brewfile packages
    platforms: [darwin]
    deps: [upd:brew:update]
    preconditions:
      - sh: command -v brew
        msg: brew not installed
    cmds:
      - HOMEBREW_NO_AUTO_UPDATE=1 brew bundle --quiet

  upd:brew:upgrade:
    desc: Upgrade brew packages
    platforms: [darwin]
    deps: [upd:brew:bundle, upd:brew:update]
    preconditions:
      - sh: command -v brew
        msg: brew not installed
    cmds:
      - HOMEBREW_NO_AUTO_UPDATE=1 brew upgrade --greedy --quiet

  upd:brew:cleanup:
    desc: Cleanup brew
    platforms: [darwin]
    deps: [upd:brew]
    preconditions:
      - sh: command -v brew
        msg: brew not installed
    cmds:
      - brew cleanup --quiet

  upd:apt:
    desc: Update apt packages
    platforms: [linux]
    preconditions:
      - sh: command -v apt-get
        msg: apt-get not installed
    cmds:
      - sudo apt-get update
      - sudo apt-get upgrade -y
      - sudo apt-get autoremove -y

  upd:dnf:
    desc: Update dnf packages
    platforms: [linux]
    preconditions:
      - sh: command -v dnf
        msg: dnf not installed
    cmds:
      - sudo dnf update -y

  upd:mise:
    desc: Update mise tools
    preconditions:
      - sh: command -v mise
        msg: mise not installed
    cmds:
      - mise up
      - mise reshim

  upd:claude:
    desc: Update Claude Code
    preconditions:
      - sh: command -v claude
        msg: claude not installed
    cmds:
      - claude --update

  upd:tmux:
    desc: Install/update tmux plugins
    deps:
      - upd:tmux:resurrect
      - upd:tmux:fzf-url

  upd:tmux:resurrect:
    desc: Install/update tmux-resurrect
    vars:
      DEST: "{{.HOME}}/.tmux/plugins/tmux-resurrect"
    cmds:
      - mkdir -p {{.HOME}}/.tmux/plugins
      - |
        if [ -d "{{.DEST}}" ]; then
          git -C "{{.DEST}}" pull --quiet
          printf "  \033[32m󰄬\033[0m tmux-resurrect (updated)\n"
        else
          git clone --quiet https://github.com/tmux-plugins/tmux-resurrect.git "{{.DEST}}"
          printf "  \033[32m󰄬\033[0m tmux-resurrect (installed)\n"
        fi

  upd:tmux:fzf-url:
    desc: Install/update tmux-fzf-url
    vars:
      DEST: "{{.HOME}}/.tmux/plugins/tmux-fzf-url"
    cmds:
      - mkdir -p {{.HOME}}/.tmux/plugins
      - |
        if [ -d "{{.DEST}}" ]; then
          git -C "{{.DEST}}" pull --quiet
          printf "  \033[32m󰄬\033[0m tmux-fzf-url (updated)\n"
        else
          git clone --quiet https://github.com/wfxr/tmux-fzf-url.git "{{.DEST}}"
          printf "  \033[32m󰄬\033[0m tmux-fzf-url (installed)\n"
        fi

  upd:zsh-completions:
    desc: Regenerate zsh completions
    deps: [upd:brew:cleanup, upd:mise]
    preconditions:
      - sh: command -v regen-zsh-completions
        msg: regen-zsh-completions not found (run task reinstall-bins)
    cmds:
      - regen-zsh-completions

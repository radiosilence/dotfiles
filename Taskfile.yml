# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

output: prefixed
silent: true
run: once

vars:
  DOTFILES: "{{.ROOT_DIR}}"
  # Icons
  OK: '\033[32m󰄬\033[0m'
  WARN: '\033[33m\033[0m'
  FAIL: '\033[31m󰅖\033[0m'
  LINK: '\033[32m󰌷\033[0m'
  WORK: '\033[35m󱁤\033[0m'
  BOLD: '\033[1m'
  RESET: '\033[0m'

env:
  CLICOLOR_FORCE: "1"
  FORCE_COLOR: "1"

tasks:
  # ===========================================================================
  # System update pipeline
  #
  # `task converge` is the single entry point. It works on both fresh systems
  # (everything missing) and converged ones (most tasks no-op via status:).
  #
  # Deps express real prerequisites — tasks that need brew packages depend on
  # brew:bundle, tasks that need mise tools depend on mise:install, etc.
  # Don't use `! command -v X` as a "skip if missing" shortcut for a tool we
  # install ourselves — that turns a missing dep into a silent no-op.
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Bootstrap tasks (fresh system)
  # ---------------------------------------------------------------------------

  xcode:install:
    desc: Install Xcode Command Line Tools
    platforms: [darwin]
    status: ["command -v git"]
    cmds:
      - xcode-select --install
      - |
        printf "{{.WARN}} waiting for Xcode CLI tools installer...\n"
        while ! command -v git >/dev/null 2>&1; do sleep 0.5; done
        printf "{{.OK}} xcode cli tools\n"

  dotfiles:clone:
    desc: Clone dotfiles repo
    deps: [xcode:install]
    status: ["test -d {{.DOTFILES}}"]
    cmds:
      - git clone https://github.com/radiosilence/dotfiles {{.DOTFILES}}
      - printf "{{.OK}} dotfiles cloned\n"

  brew:install:
    desc: Install Homebrew
    platforms: [darwin]
    # sudo:touchid runs first so brew's sudo prompts use Touch ID instead of
    # blocking on a password the non-interactive shell can't supply.
    deps: [sudo:touchid]
    status: ["command -v brew"]
    cmds:
      # NONINTERACTIVE=1 skips the "press RETURN" prompt brew bombs on without a TTY.
      - NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
      - |
        if [ -d /opt/homebrew ]; then
          eval "$(/opt/homebrew/bin/brew shellenv)"
        else
          eval "$(/usr/local/bin/brew shellenv)"
        fi
      - printf "{{.OK}} homebrew\n"

  brew:roles:
    desc: Copy Brewfile roles template
    deps: [dotfiles:clone]
    status: ["test -f {{.DOTFILES}}/dotfiles-roles.yml"]
    cmds:
      - cp {{.DOTFILES}}/dotfiles-roles.yml.template {{.DOTFILES}}/dotfiles-roles.yml
      - printf "{{.WARN}} copied dotfiles-roles.yml — edit to enable brew roles\n"

  1password:setup:
    desc: Set up 1Password SSH agent
    platforms: [darwin]
    deps: [brew:bundle]
    status:
      - "test -S ~/Library/Group\\ Containers/2BUA8C4S2C.com.1password/t/agent.sock"
    cmds:
      - |
        # Sanity-check the app actually landed before telling the user to open it.
        if [ ! -d "/Applications/1Password.app" ]; then
          printf "{{.FAIL}} 1Password.app not installed — brew:bundle should have done this\n"
          exit 1
        fi
        printf "{{.WARN}} open 1Password, sign in, and enable the SSH agent (Settings → Developer → SSH Agent)\n"
        sock="$HOME/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock"
        while [ ! -S "$sock" ]; do sleep 0.5; done
        printf "{{.OK}} 1password ssh agent\n"

  1password:ssh-config:
    desc: Add 1Password SSH agent to ~/.ssh/config
    platforms: [darwin]
    status: ["grep -q '2BUA8C4S2C.com.1password' ~/.ssh/config 2>/dev/null"]
    cmds:
      - |
        mkdir -p ~/.ssh
        [ -f ~/.ssh/config ] || touch ~/.ssh/config && chmod 600 ~/.ssh/config
        printf '\nHost *\n  IdentityAgent "~/Library/Group Containers/2BUA8C4S2C.com.1password/t/agent.sock"\n' >> ~/.ssh/config
        printf "{{.OK}} 1password ssh agent added to ~/.ssh/config\n"

  gh:auth:
    desc: Authenticate GitHub CLI
    deps: [1password:setup]
    status: ["gh auth status 2>/dev/null"]
    cmds:
      - printf "{{.WARN}} gh is not authenticated — run 'gh auth login' in another terminal\n"
      - |
        while ! gh auth status &>/dev/null; do sleep 0.5; done
        printf "{{.OK}} gh authenticated\n"

  rosetta:install:
    desc: Install Rosetta 2 (Apple Silicon)
    platforms: [darwin]
    status: ["test $(uname -m) != arm64 || /usr/bin/pgrep -q oahd 2>/dev/null"]
    cmds:
      - /usr/sbin/softwareupdate --install-rosetta --agree-to-license
      - printf "{{.OK}} rosetta 2\n"

  claude:install:
    desc: Install Claude Code
    status: ["command -v claude"]
    cmds:
      - curl -fsSL https://claude.ai/install.sh | bash
      - printf "{{.OK}} claude code\n"

  sudo:touchid:
    desc: Enable TouchID for sudo
    platforms: [darwin]
    status: ["grep -q pam_tid /etc/pam.d/sudo_local 2>/dev/null"]
    cmds:
      - sudo sh -c 'printf "auth       sufficient     pam_tid.so\n" > /etc/pam.d/sudo_local'
      - printf "{{.OK}} touchid sudo\n"

  brew:pam-reattach:
    desc: Install pam-reattach (Touch ID inside zellij/tmux detached sessions)
    platforms: [darwin]
    deps: [brew:install]
    status: ["test -f /opt/homebrew/lib/pam/pam_reattach.so"]
    cmds:
      - brew install pam-reattach
      - printf "{{.OK}} pam-reattach\n"

  sudo:reattach:
    desc: Prepend pam_reattach to sudo_local so Touch ID works in detached sessions
    platforms: [darwin]
    deps: [brew:pam-reattach, sudo:touchid]
    status: ["grep -q pam_reattach /etc/pam.d/sudo_local 2>/dev/null"]
    cmds:
      - |
        # Resolve dynamically — handles both /opt/homebrew and /usr/local.
        # Refuse to touch sudo_local if the .so is missing: a sudo_local that
        # references a non-existent module bricks sudo entirely, and recovery
        # requires enabling the root user via Directory Utility.
        so="$(brew --prefix pam-reattach)/lib/pam/pam_reattach.so"
        if [ ! -f "$so" ]; then
          printf "{{.FAIL}} pam_reattach.so missing at %s — refusing to edit sudo_local\n" "$so"
          exit 1
        fi
        # Backup, write, then probe PAM. If sudo can't initialize PAM, revert.
        backup=$(mktemp)
        sudo cp /etc/pam.d/sudo_local "$backup"
        sudo sh -c "{ printf 'auth       optional       %s\n' '$so'; cat /etc/pam.d/sudo_local; } > /etc/pam.d/sudo_local.tmp && mv /etc/pam.d/sudo_local.tmp /etc/pam.d/sudo_local"
        if sudo -n true 2>&1 | grep -q "initialize PAM"; then
          printf "{{.FAIL}} sudo PAM broke after edit — reverting\n"
          sudo cp "$backup" /etc/pam.d/sudo_local
          rm -f "$backup"
          exit 1
        fi
        rm -f "$backup"
        printf "{{.OK}} sudo reattach\n"

  sudo:timeout:
    desc: Set sudo timeout to 30 min
    platforms: [darwin]
    status: ["test -f /etc/sudoers.d/timeout"]
    cmds:
      - sudo sh -c 'echo "Defaults timestamp_timeout=30" > /etc/sudoers.d/timeout && chmod 0440 /etc/sudoers.d/timeout'
      - printf "{{.OK}} sudo timeout\n"

  mise:ensure:
    desc: Ensure mise is installed
    platforms: [darwin]
    deps: [brew:install]
    status: ["command -v mise"]
    cmds:
      - brew install mise
      - printf "{{.OK}} mise installed\n"

  mise:install:
    desc: Install mise tools
    deps: [mise:ensure, gh:auth, link:config]
    status:
      - 'test -z "$(mise ls --missing 2>/dev/null)"'
    cmds:
      - |
        export PATH="$HOME/.local/share/mise/shims:$PATH"
        mise install
      - printf "{{.OK}} mise tools installed\n"

  converge:
    desc: Converge system to desired state
    # Most tasks below are reached transitively via the DAG. They're listed
    # here as explicit entry points — order does not matter, deps decide it.
    deps:
      - brew:roles
      - rosetta:install
      - claude:install
      - sudo:reattach
      - sudo:timeout
      - 1password:ssh-config
      - use-ssh
      - link
      - check:auth
      - brew:bundle
      - apt:upgrade
      - dnf:upgrade
      - mise:upgrade
      - reinstall-bins
      - secrets:populate
      - generate:completions
    cmds:
      - rm -f ~/.cache/zsh/eval/*.zsh ~/.cache/zsh/eval/*.zwc
      - rm -f ~/.config/zsh/conf.d/*.zwc
      - rm -f ~/.zcompdump
      - printf "{{.OK}} {{.BOLD}}converged{{.RESET}} (restart shell for changes)\n"

  # ---------------------------------------------------------------------------
  # Link tasks
  # ---------------------------------------------------------------------------

  link:
    desc: Symlink dotfiles and configs
    deps:
      - link:dotfiles
      - link:config
      - patch:gitconfig
      - patch:ssh
      - link:brewfile
      - link:claude-hooks
      - link:sheldon
      - link:launchagents
      - link:cargo

  link:dotfiles:
    desc: Symlink dotfiles (.* → ~)
    deps: [dotfiles:clone]
    cmds:
      - |
        for f in "{{.DOTFILES}}"/.* ; do
          name=$(basename "$f")
          case "$name" in
            .|..|.git|.gitignore|.github|.vscode|.sonarlint|\
            .editorconfig|.codeowners-lsp|.ruby-lsp|.crates.toml|.crates2.json)
              continue ;;
          esac
          target="$HOME/$name"
          [ -L "$target" ] && [ "$(readlink "$target")" = "$f" ] && continue
          rm -rf "$target"
          ln -s "$f" "$target"
          printf "{{.LINK}} %s\n" "$name"
        done

  link:config:
    desc: Symlink config dirs (config.d/* → ~/.config/*)
    deps: [dotfiles:clone]
    cmds:
      - |
        mkdir -p "$HOME/.config"
        for f in "{{.DOTFILES}}/config.d"/*; do
          [ -e "$f" ] || continue
          name=$(basename "$f")
          target="$HOME/.config/$name"
          [ -L "$target" ] && [ "$(readlink "$target")" = "$f" ] && continue
          rm -rf "$target"
          ln -s "$f" "$target"
          printf "{{.LINK}} ~/.config/%s\n" "$name"
        done

  patch:gitconfig:
    desc: Ensure gitconfig includes dotfiles
    cmds:
      - |
        [ -f "$HOME/.gitconfig" ] || touch "$HOME/.gitconfig"
        grep -q '.dotfiles' "$HOME/.gitconfig" 2>/dev/null && exit 0
        printf '\n[include]\npath = ~/.dotfiles/git.d/core.conf\n' >> "$HOME/.gitconfig"
        printf "{{.OK}} gitconfig include\n"

  patch:ssh:
    desc: Ensure SSH config includes dotfiles
    cmds:
      - |
        mkdir -p "$HOME/.ssh"
        if [ ! -f "$HOME/.ssh/config" ]; then
          touch "$HOME/.ssh/config"
          chmod 600 "$HOME/.ssh/config"
        fi
        grep -q '.dotfiles' "$HOME/.ssh/config" 2>/dev/null && exit 0
        printf '\nInclude ~/.dotfiles/ssh.d/*.conf\n' >> "$HOME/.ssh/config"
        printf "{{.OK}} ssh config include\n"

  link:brewfile:
    desc: Symlink Brewfile
    platforms: [darwin]
    deps: [dotfiles:clone]
    cmds:
      - |
        target="$HOME/Brewfile"
        [ -L "$target" ] && [ "$(readlink "$target")" = "{{.DOTFILES}}/Brewfile" ] && exit 0
        ln -sf "{{.DOTFILES}}/Brewfile" "$target"
        printf "{{.OK}} Brewfile\n"

  link:claude-hooks:
    desc: Inject Claude Code hooks into settings.json
    deps: [brew:bundle, dotfiles:clone]
    # Skip if jq is missing (non-darwin without it) or Claude hasn't run yet
    status: ["! command -v jq || ! test -f $HOME/.claude/settings.json"]
    cmds:
      - |
        claude_settings="$HOME/.claude/settings.json"
        jq -e '.hooks.PostToolUse[]?.hooks[]? | select(.command | contains("gastown-file-changed"))' "$claude_settings" >/dev/null 2>&1 && exit 0
        jq '
          .hooks //= {} |
          .hooks.PostToolUse //= [] |
          .hooks.PostToolUse += [{"matcher": "Write|Edit", "hooks": [{"type": "command", "command": "~/.dotfiles/hooks/gastown-file-changed.sh"}]}]
        ' "$claude_settings" > "$claude_settings.tmp" && mv "$claude_settings.tmp" "$claude_settings"
        printf "{{.OK}} claude hooks: gastown\n"

  secrets:populate:
    desc: Populate ~/mise.local.toml secrets from 1Password (single op inject call)
    deps: [brew:bundle, reinstall-bins]
    vars:
      TMPL: "{{.DOTFILES}}/packager.d/mise-secrets.tmpl"
      LOCAL: "$HOME/mise.local.toml"
    status:
      - |
        for key in $(grep -E '^[A-Z_][A-Z_0-9]* *=' "{{.TMPL}}" | cut -d= -f1 | tr -d ' '); do
          [ -z "$(yq -p toml -oy ".env.${key} // \"\"" "{{.LOCAL}}" 2>/dev/null)" ] && exit 1
        done
    cmds:
      - |
        [ -f "{{.LOCAL}}" ] || printf '[env]\n' > "{{.LOCAL}}"
        grep -q '^\[env\]' "{{.LOCAL}}" || printf '\n[env]\n' >> "{{.LOCAL}}"

        # One op call → all secrets resolved at once
        resolved=$(op inject -i "{{.TMPL}}") || { printf "{{.FAIL}} op inject failed (is op signed in?)\n"; exit 1; }

        for key in $(grep -E '^[A-Z_][A-Z_0-9]* *=' "{{.TMPL}}" | cut -d= -f1 | tr -d ' '); do
          [ -n "$(yq -p toml -oy ".env.${key} // \"\"" "{{.LOCAL}}" 2>/dev/null)" ] && continue
          line=$(printf '%s\n' "$resolved" | grep -E "^${key} *=")
          [ -z "$line" ] && continue
          printf '%s\n' "$line" >> "{{.LOCAL}}"
          printf "{{.OK}} %s\n" "$key"
        done

  link:cargo:
    desc: Symlink cargo security config
    deps: [dotfiles:clone]
    cmds:
      - |
        mkdir -p "$HOME/.cargo"
        target="$HOME/.cargo/config.toml"
        src="{{.DOTFILES}}/packager.d/cargo-config.toml"
        [ -L "$target" ] && [ "$(readlink "$target")" = "$src" ] && exit 0
        if [ -f "$target" ] && [ ! -L "$target" ]; then
          printf "{{.WARN}} ~/.cargo/config.toml exists — merge %s manually\n" "$src"
          exit 0
        fi
        ln -sf "$src" "$target"
        printf "{{.LINK}} cargo config\n"

  link:launchagents:
    desc: Symlink and reload LaunchAgents
    platforms: [darwin]
    # Wait for brew + mise: plists often reference binaries from both, and
    # bootstrapping a plist with a missing executable logs noise to Console.
    deps: [dotfiles:clone, brew:bundle, mise:install]
    cmds:
      - |
        mkdir -p "$HOME/Library/LaunchAgents"
        for f in "{{.DOTFILES}}/launchd"/*.plist; do
          [ -e "$f" ] || continue
          name=$(basename "$f")
          label="${name%.plist}"
          target="$HOME/Library/LaunchAgents/$name"
          # Skip everything if symlink already correct — no relink, no reload.
          if [ -L "$target" ] && [ "$(readlink "$target")" = "$f" ]; then
            continue
          fi
          rm -f "$target"
          ln -s "$f" "$target"
          launchctl bootout "gui/$(id -u)/$label" 2>/dev/null || true
          launchctl bootstrap "gui/$(id -u)" "$target"
          printf "{{.OK}} %s (loaded)\n" "$label"
        done

  link:sheldon:
    desc: Sheldon plugin manager smoke test
    deps: [brew:bundle]
    # Skip on systems where sheldon isn't available (non-darwin)
    status:
      - "! command -v sheldon || sheldon source >/dev/null 2>&1"
    cmds:
      - 'printf "{{.WARN}} sheldon source failed\n"'

  # ---------------------------------------------------------------------------
  # Build / utility tasks
  # ---------------------------------------------------------------------------

  reinstall-bins:
    desc: Build and install rust binaries from crates/
    deps: [mise:install, dotfiles:clone]
    status: ["test -f {{.DOTFILES}}/bin/clean-dls"]
    cmds:
      - printf "{{.WORK}} building rust binaries\n"
      - |
        export PATH="$HOME/.local/share/mise/shims:$PATH"
        cargo install --path {{.DOTFILES}}/crates --bins --root {{.DOTFILES}}
      - printf "{{.OK}} binaries installed\n"

  use-ssh:
    desc: Switch dotfiles remote from HTTPS to SSH
    deps: [dotfiles:clone, 1password:setup]
    dir: "{{.DOTFILES}}"
    status:
      - 'git remote get-url origin 2>/dev/null | grep -q "^git@"'
    cmds:
      - |
        current=$(git remote get-url origin)
        ssh_url=$(echo "$current" | sed -E 's|https://github.com/(.+)|git@github.com:\1|')
        git remote set-url origin "$ssh_url"
        printf "{{.OK}} remote switched to %s\n" "$ssh_url"

  # ---------------------------------------------------------------------------
  # Update tasks
  # ---------------------------------------------------------------------------

  check:auth:
    desc: Check authentication status
    deps:
      - check:auth:gh
      - check:auth:op

  check:auth:gh:
    desc: Check GitHub CLI auth
    platforms: [darwin]
    # gh:auth blocks until the user runs `gh auth login`, so by the time this
    # status check fires, gh either auths cleanly or really is broken.
    deps: [gh:auth]
    status: ["gh auth status >/dev/null 2>&1"]
    cmds:
      - 'printf "{{.WARN}} gh: not authenticated (run gh auth login)\n"'

  check:auth:op:
    desc: Check 1Password CLI integration
    platforms: [darwin]
    # 1password:setup waits for the SSH agent socket — by then the user has
    # been through 1Password settings and op should be talking to the app.
    deps: [1password:setup]
    status: ["op account list >/dev/null 2>&1"]
    cmds:
      - 'printf "{{.WARN}} op: not integrated (check 1Password CLI settings)\n"'

  brew:bundle:
    desc: Install/upgrade brew packages
    deps: [brew:install, link:brewfile, brew:pam-reattach]
    platforms: [darwin]
    status: ["brew bundle check >/dev/null 2>&1"]
    cmds:
      - brew bundle --quiet
      - brew cleanup --quiet &

  apt:upgrade:
    desc: Update apt packages
    platforms: [linux]
    status: ["! command -v apt-get"]
    cmds:
      - sudo apt-get update
      - sudo apt-get upgrade -y
      - sudo apt-get autoremove -y

  dnf:upgrade:
    desc: Update dnf packages
    platforms: [linux]
    status: ["! command -v dnf"]
    cmds:
      - sudo dnf update -y

  mise:upgrade:
    desc: Update mise tools
    deps: [mise:install]
    cmds:
      - mise up
      - mise reshim

  generate:completions:
    desc: Regenerate zsh completions
    deps:
      - for:
          - argocd
          - buf
          - clean-dls
          - clean-exif
          - docker
          - embed-art
          - extract-exif-from-flac
          - fcloud
          - git-squash
          - git-sync
          - glow
          - golangci-lint
          - gt
          - helm
          - houston
          - imp
          - k9s
          - kill-port
          - kubecolor
          - kubectl
          - lefthook
          - nano-web
          - op
          - orbctl
          - parallel-dl-extract
          - procs
          - prune
          - prune-gen
          - pulumi
          - sesh
          - tilt
          - to-audio
          - turso
          - unfuck-xcode
          - url2base64
          - vimv
          - watchwoman
          - yq
        task: generate:completions:gen
        vars:
          TOOL: "{{.ITEM}}"
          CMD: "{{.ITEM}} completion zsh"
      # Custom completion commands
      - task: generate:completions:gen
        vars: { TOOL: aube, CMD: "aube completion zsh" }
      - task: generate:completions:gen
        vars: { TOOL: nr, CMD: "nr --completion-zsh" }
      - task: generate:completions:gen
        vars: { TOOL: gh, CMD: "gh completion -s zsh" }
      - task: generate:completions:gen
        vars: { TOOL: fastmail-cli, CMD: "fastmail-cli completions zsh" }
      - task: generate:completions:gen
        vars: { TOOL: koan, CMD: "koan completions zsh" }
      - task: generate:completions:gen
        vars: { TOOL: codeowners-cli, CMD: "codeowners-cli completions zsh" }
      - task: generate:completions:gen
        vars: { TOOL: task, CMD: "task --completion zsh" }
      - task: generate:completions:gen
        vars: { TOOL: just, CMD: "just --completions zsh" }
      - task: generate:completions:gen
        vars: { TOOL: aws-vault, CMD: "aws-vault --completion-script-zsh" }
      - task: generate:completions:gen
        vars: { TOOL: rg, CMD: "rg --generate complete-zsh" }
      - task: generate:completions:gen
        vars: { TOOL: xh, CMD: "xh --generate complete-zsh" }
      - task: generate:completions:gen
        vars: { TOOL: pup, CMD: "pup completions zsh" }
      - task: generate:completions:gen
        vars:
          { TOOL: bun, CMD: "bun completions zsh | sed '/zstyle .:completion:.*:bun.*format/d'" }
      - task: generate:completions:gen
        vars: { TOOL: deno, CMD: "deno completions zsh" }
      - task: generate:completions:gen
        vars: { TOOL: starship, CMD: "starship completions zsh" }
      - task: generate:completions:gen
        vars: { TOOL: sheldon, CMD: "sheldon completions --shell zsh" }
      - task: generate:completions:gen
        vars: { TOOL: bat, CMD: "bat --completion zsh" }
      - task: generate:completions:gen
        vars: { TOOL: delta, CMD: "delta --generate-completion zsh" }
      # Prebuilt: lsd
      - task: generate:completions:lsd
      # Sourced: npm
      - task: generate:completions:npm
    cmds:
      - |
        n=$(wc -l < /tmp/.task-completions-changed 2>/dev/null | tr -d ' ' || echo 0)
        printf "{{.OK}} completions: %s updated\n" "${n:-0}"

  generate:completions:setup:
    internal: true
    deps: [brew:bundle, mise:install]
    vars:
      COMP_DIR: "{{.HOME}}/.config/zsh/completions"
      STATE: "/tmp/.task-completions-changed"
    cmds:
      - mkdir -p {{.COMP_DIR}}
      - ": > {{.STATE}}"

  generate:completions:gen:
    internal: true
    run: always
    deps: [generate:completions:setup]
    status: ["! command -v {{.TOOL}}"]
    vars:
      COMP_DIR: "{{.HOME}}/.config/zsh/completions"
      STATE: "/tmp/.task-completions-changed"
    cmds:
      - |
        new=$(mktemp)
        if {{.CMD}} > "$new" 2>/dev/null && [ -s "$new" ]; then
          if ! cmp -s "$new" "{{.COMP_DIR}}/_{{.TOOL}}" 2>/dev/null; then
            mv "$new" "{{.COMP_DIR}}/_{{.TOOL}}"
            printf "{{.OK}} %s\n" "{{.TOOL}}"
            echo "{{.TOOL}}" >> {{.STATE}}
          else
            rm -f "$new"
          fi
        else
          rm -f "$new"
        fi

  generate:completions:lsd:
    internal: true
    deps: [generate:completions:setup]
    status: ["! command -v lsd"]
    vars:
      COMP_DIR: "{{.HOME}}/.config/zsh/completions"
      STATE: "/tmp/.task-completions-changed"
    cmds:
      - |
        src="$(dirname "$(command -v lsd)")/autocomplete/_lsd"
        [ -f "$src" ] || exit 0
        if ! cmp -s "$src" "{{.COMP_DIR}}/_lsd" 2>/dev/null; then
          cp "$src" "{{.COMP_DIR}}/_lsd"
          printf "{{.OK}} lsd (pre-built)\n"
          echo "lsd" >> {{.STATE}}
        fi

  generate:completions:npm:
    internal: true
    deps: [generate:completions:setup]
    status: ["! command -v npm"]
    vars:
      STATE: "/tmp/.task-completions-changed"
    cmds:
      - |
        new=$(mktemp)
        if npm completion > "$new" 2>/dev/null && [ -s "$new" ]; then
          if ! cmp -s "$new" "{{.DOTFILES}}/config.d/zsh/conf.d/npm-completion.zsh" 2>/dev/null; then
            mv "$new" "{{.DOTFILES}}/config.d/zsh/conf.d/npm-completion.zsh"
            printf "{{.OK}} npm (sourced)\n"
            echo "npm" >> {{.STATE}}
          else
            rm -f "$new"
          fi
        else
          rm -f "$new"
        fi

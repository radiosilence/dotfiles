# Dotfiles configuration
#
# This file is tracked in git. For local overrides, create dotfiles.local.toml
# (gitignored). Arrays (completions, fonts) are concatenated; scalars are replaced.
#
# [completions.tools] — ZSH completion generation
#   Default: runs `<name> completion zsh`, writes to `_<name>`
#   Override `command` for tools with different invocations.
#   `type` controls special handling:
#     - "prebuilt": copies from `source` (relative to binary location)
#     - "sourced": runs command, writes to `output` (relative to ~/.dotfiles)
#
# [[fonts]] — macOS font auto-installation (checked by upd)

# --- External tools ---

[[completions.tools]]
name = "gt"

[[completions.tools]]
name = "argocd"

[[completions.tools]]

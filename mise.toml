[tools]

[tasks.reinstall-bins]
description = "Build and install rust binaries from crates/"
run = '''
#!/usr/bin/env bash
set -euo pipefail
if ! command -v cargo >/dev/null 2>&1; then
    printf "\033[31m  !! cargo not found\033[0m\n"
    exit 1
fi
printf "\033[33m  -> building rust binaries...\033[0m\n"
cargo install --path "{{config_root}}/crates" --bins --root "{{config_root}}"
printf "\033[32m  ok binaries -> ~/.dotfiles/bin\033[0m\n"
'''

[tasks.use-ssh]
description = "Switch dotfiles remote from HTTPS to SSH"
run = '''
#!/usr/bin/env bash
set -euo pipefail
cd "{{config_root}}"
current=$(git remote get-url origin)
if echo "$current" | grep -q "^git@"; then
  printf "\033[32m  ok already using SSH\033[0m\n"
  exit 0
fi
ssh_url=$(echo "$current" | sed -E 's|https://github.com/(.+)|git@github.com:\1|')
git remote set-url origin "$ssh_url"
printf "\033[32m  ok remote switched to %s\033[0m\n" "$ssh_url"
'''

[tools]

[tasks.link]
description = "Symlink dotfiles and configs to their destinations"
run = '''
#!/usr/bin/env bash
set -euo pipefail

DOTFILES="{{config_root}}"

# --- Dotfiles (.* → ~) ---
for f in "$DOTFILES"/.*; do
  name=$(basename "$f")
  case "$name" in
    .|..|.git|.gitignore|.github|.vscode|.sonarlint|\
    .editorconfig|.codeowners-lsp|.ruby-lsp|.crates.toml|.crates2.json)
      continue ;;
  esac

  target="$HOME/$name"

  if [ -L "$target" ] && [ "$(readlink "$target")" = "$f" ]; then
    continue
  fi

  rm -rf "$target"
  ln -s "$f" "$target"
  printf "\033[32m  ok\033[0m %s\n" "$name"
done

# --- Config dirs (config.d/* → ~/.config/*) ---
mkdir -p "$HOME/.config"

if [ -d "$DOTFILES/config.d" ]; then
  for f in "$DOTFILES/config.d"/*; do
    [ -e "$f" ] || continue
    name=$(basename "$f")
    [ "$name" = "launchd" ] && continue
    target="$HOME/.config/$name"

    if [ -L "$target" ] && [ "$(readlink "$target")" = "$f" ]; then
      continue
    fi

    rm -rf "$target"
    ln -s "$f" "$target"
    printf "\033[32m  ok\033[0m ~/.config/%s\n" "$name"
  done
fi

# --- Gitconfig include ---
[ -f "$HOME/.gitconfig" ] || touch "$HOME/.gitconfig"
if ! grep -q '.dotfiles' "$HOME/.gitconfig" 2>/dev/null; then
  printf '\n[include]\npath = ~/.dotfiles/git.d/core.conf\n' >> "$HOME/.gitconfig"
  printf "\033[32m  ok\033[0m gitconfig include\n"
fi

# --- SSH config include ---
mkdir -p "$HOME/.ssh"
if [ ! -f "$HOME/.ssh/config" ]; then
  touch "$HOME/.ssh/config"
  chmod 600 "$HOME/.ssh/config"
fi
if ! grep -q '.dotfiles' "$HOME/.ssh/config" 2>/dev/null; then
  printf '\nInclude ~/.dotfiles/ssh.d/*.conf\n' >> "$HOME/.ssh/config"
  printf "\033[32m  ok\033[0m ssh config include\n"
fi

# --- Brewfile (macOS) ---
if [ "$(uname)" = "Darwin" ] && [ -f "$DOTFILES/Brewfile" ]; then
  target="$HOME/Brewfile"
  if ! [ -L "$target" ] || [ "$(readlink "$target")" != "$DOTFILES/Brewfile" ]; then
    ln -sf "$DOTFILES/Brewfile" "$target"
    printf "\033[32m  ok\033[0m Brewfile\n"
  fi
fi

# --- Launchd agents (macOS) ---
if [ "$(uname)" = "Darwin" ] && [ -d "$DOTFILES/config.d/launchd" ]; then
  agents="$HOME/Library/LaunchAgents"
  mkdir -p "$agents"
  for plist in "$DOTFILES/config.d/launchd"/*.plist; do
    [ -f "$plist" ] || continue
    name=$(basename "$plist")
    dest="$agents/$name"
    if [ -f "$dest" ] && cmp -s "$plist" "$dest"; then
      continue
    fi
    cp "$plist" "$dest"
    launchctl unload "$dest" 2>/dev/null || true
    launchctl load "$dest" 2>/dev/null || true
    printf "\033[32m  ok\033[0m launchd: %s\n" "$name"
  done
fi

# --- Sheldon plugins ---
if command -v sheldon >/dev/null 2>&1; then
  sheldon source >/dev/null 2>&1 && printf "\033[32m  ok\033[0m sheldon\n" || true
fi

printf "\033[32m  ok\033[0m link complete\n"
'''


[tasks.reinstall-bins]
description = "Build and install rust binaries from crates/"
run = '''
#!/usr/bin/env bash
set -euo pipefail
if ! command -v cargo >/dev/null 2>&1; then
    printf "\033[31m  !! cargo not found\033[0m\n"
    exit 1
fi
printf "\033[33m  -> building rust binaries...\033[0m\n"
cargo install --path "{{config_root}}/crates" --bins --root "{{config_root}}"
printf "\033[32m  ok binaries -> ~/.dotfiles/bin\033[0m\n"
'''

[tasks.use-ssh]
description = "Switch dotfiles remote from HTTPS to SSH"
run = '''
#!/usr/bin/env bash
set -euo pipefail
cd "{{config_root}}"
current=$(git remote get-url origin)
if echo "$current" | grep -q "^git@"; then
  printf "\033[32m  ok already using SSH\033[0m\n"
  exit 0
fi
ssh_url=$(echo "$current" | sed -E 's|https://github.com/(.+)|git@github.com:\1|')
git remote set-url origin "$ssh_url"
printf "\033[32m  ok remote switched to %s\033[0m\n" "$ssh_url"
'''
